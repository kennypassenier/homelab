version: 1
stack_name: "media"
vmid: 104
hostname: "lxc-media"
hwaddr: "02:42:ac:11:34:7a"

deploy:
  enabled: false
  activated_at: null

network:
  bridge: "vmbr0"
  ip_mode: "dhcp-reserved"
  reserved_ipv4: "10.10.10.104"

boot:
  autostart: true
  order: 90

resources:
  cores: 2
  memory_mb: 2048
  disk_gb: 32

storage:
  host_path: "/opt/appdata/media"
  mount_point: "/appdata"

lxc:
  template: "debian-12-standard 12.12-1 amd64"
  unprivileged: true
  features:
    - "nesting=1"

hardware:
  tun_device: null  # null=auto-detect, true=force, false=disable

host_management:
  managed: true

notes: "Set deploy.enabled=true when the stack is activated in CLIENT."
