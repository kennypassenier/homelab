services:
  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    env_file:
      - .env
    environment:
      - TZ=Europe/Brussels
      # Use SQLite — no external database needed for a homelab setup.
      # The db file lives inside the mounted files volume so it's covered by Restic backups.
      - VIKUNJA_DATABASE_TYPE=sqlite
      - VIKUNJA_DATABASE_PATH=/app/vikunja/files/vikunja.db
    volumes:
      # Automatically refers to the fast NVMe host storage isolated per stack.
      # The official image stores both user files and the SQLite db here.
      - /appdata/vikunja/vikunja/config:/app/vikunja/files
    labels:
      # Enable automatic software updates via Watchtower
      - "com.centurylinklabs.watchtower.enable=true"
      # Pause container during Restic backups to prevent database corruption
      - "com.homelab.backup.pause=true"
    ports:
      - "3456:3456"
    restart: unless-stopped
