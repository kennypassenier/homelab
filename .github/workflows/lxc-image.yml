name: lxc-image

"on":
  push:
    branches:
      - main
    paths:
      - "lxc-daemon/**"
      - ".github/workflows/lxc-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: LXC daemon changes detected
        run: |
          echo "LXC daemon source changes detected."
          echo ""
          echo "Docker image building and publishing is now managed via Makefile."
          echo "Run: make docker"
          echo ""
          echo "To create a release with image push:"
          echo "Run: make release-lxc"

