services:
  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    env_file:
      - .env
    environment:
      - TZ=Europe/Brussels
      - VIKUNJA_DATABASE_TYPE=sqlite
      - VIKUNJA_DATABASE_PATH=/app/vikunja/files/vikunja.db
    volumes:
      - /appdata/todo/vikunja/config:/app/vikunja/files
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.homelab.backup.pause=true"
      - "com.homelab.tag.watchtower=enabled"
      - "com.homelab.tag.traefik.subdomain=vikunja"
      - "com.homelab.tag.gpu=disabled"
      - "com.homelab.tag.vpn=none"
      - "traefik.enable=true"
      - "traefik.http.routers.vikunja.rule=Host(`vikunja.${DOMAIN:-example.com}`)"
      - "traefik.http.services.vikunja.loadbalancer.server.port=3456"
    ports:
      - "3456:3456"
    restart: unless-stopped
