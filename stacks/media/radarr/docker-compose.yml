services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Brussels
    volumes:
      - /appdata/media/radarr/config:/config
      - /mnt/data/18TB:/data/18TB
      - /mnt/data/12TB:/data/12TB
    ports:
      - "7878:7878"
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.homelab.backup.pause=true"
      - "com.homelab.tag.watchtower=enabled"
      - "com.homelab.tag.traefik.subdomain=radarr"
      - "com.homelab.tag.gpu=disabled"
      - "com.homelab.tag.vpn=none"
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN:-example.com}`)"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
