name: host-release

on:
  push:
    tags:
      - "host-daemon-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build HOST daemon
        working-directory: host-daemon
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package binary
        run: |
          cp host-daemon/target/x86_64-unknown-linux-gnu/release/HOST HOST-linux-x86_64-unknown-linux-gnu
          chmod +x HOST-linux-x86_64-unknown-linux-gnu

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: HOST-linux-x86_64-unknown-linux-gnu
