name: host-release

on:
  push:
    tags:
      - "host-daemon-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Tag pushed
        run: |
          echo "Host daemon release tag detected: ${{ github.ref_name }}"
          echo ""
          echo "Release artifacts are now built and published via Makefile."
          echo "See docs/ for release instructions."

